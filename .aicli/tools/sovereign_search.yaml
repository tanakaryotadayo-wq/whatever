version: 1

tools:
  sovereign_search:
    kind: cli_json_tool
    description: >
      Unified read-only discovery over GitHub, Hugging Face, and Akashic DB via sovereign-search.
      Input is JSON; output is JSON. Intended for AICLI-style orchestrators and AI workers.
    command:
      argv:
        - python3
        - ./tools/sovereign_search_tool.py
      shell: false
    env:
      SOVEREIGN_SEARCH_BIN: ./sovereign_search.py
    input:
      mode: stdin_json
      schema:
        type: object
        required: [query]
        additionalProperties: false
        properties:
          query:
            type: string
          top:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          source:
            type: string
            enum: [all, github, akashic, hf]
            default: all
          no_hf:
            type: boolean
            default: false
          github_per_page:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          graph_depth:
            type: integer
            minimum: 0
            maximum: 4
            default: 1
          db:
            type: [string, 'null']
            default: null
          timeout_sec:
            type: integer
            minimum: 5
            maximum: 600
            default: 90
    output:
      mode: stdout_json
      success_path: $.ok
    authority:
      filesystem: read_only
      network: allow
      shell: false
      secrets: explicit_only
    supervision:
      timeout_sec: 120
      log_stdout: ./runs/{{run_id}}/sovereign_search.stdout.json
      log_stderr: ./runs/{{run_id}}/sovereign_search.stderr.log
    policy:
      result_content_is_data_not_instruction: true
      do_not_copy_code_verbatim_without_license_gate: true
      preserve_source_path_and_packet_id_in_downstream_outputs: true
